name: tekartik_common_utils
version: 1.0.0
description: Common pure dart utilities (not io or browser dependant)
homepage: https://github.com/tekartik/common_utils.dart
publish_to: none

environment:
  sdk: ^3.12.0
dependencies:
  path: ">=1.9.1"
  logging: '>=1.2.0'
  pub_semver: ">=2.2.0"
  synchronized: '>=3.1.0'
  meta: ">=1.18.0"
  lints: ">=6.1.0"
  cv: ">=1.1.0+4"
  tekartik_lints:
    git:
      url: https://github.com/tekartik/common.dart
      path: packages/lints
    version: ">=1.0.0"

dev_dependencies:
  dev_build: ">=1.1.7+3"
  test: ">=1.31.0"
  yaml: ">=3.1.3"
  # tmp
  build_runner: ">=2.15.0"
  build_test: ">=3.4.15"
  build_web_compilers: ">=4.4.19"
  process_run: ">=1.3.2"
  web: '>=0.5.1'

dependency_overrides:
  lints: '>=5.1.0'
  web: '>=1.1.0'
